server:
  port: 8085

spring:
  application:
    name: shaklee-rag
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-ada-002
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
logging:
  level:
    org.springframework.ai: DEBUG